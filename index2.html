<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
    margin-top: 100px;
}

button {
    padding: 10px 20px;
    background: red;
    color: white;
    border: none;
    cursor: pointer;
}
</style>

</head>
<body>

<h1 id="welcome"></h1>

<button onclick="logout()">Logout</button>

<script>
let user = JSON.parse(localStorage.getItem("user"));

if (!user) {
    window.location.href = "index.html";
} else {
    document.getElementById("welcome").innerText = "Welcome " + user.name;
}

function logout() {
    localStorage.removeItem("user");
    window.location.href = "index.html";
}
</script>

</body>
</html>
